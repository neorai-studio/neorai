<svg
  viewBox="0 0 1440 120"
  xmlns="http://www.w3.org/2000/svg"
  preserveAspectRatio="none"
  style="width: 100%; height: 120px; display: block;"
>
  <defs>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="fadeEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0a0a" />
      <stop offset="12%"  stop-color="transparent" />
      <stop offset="88%"  stop-color="transparent" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
  </defs>

  <!-- road surface -->
  <rect x="0" y="20" width="1440" height="100" fill="url(#roadGrad)" />

  <!-- top edge line -->
  <line x1="0" y1="20" x2="1440" y2="20" stroke="#3a3a2a" stroke-width="1.5" opacity="0.7" />

  <!-- outer left lane line -->
  <line x1="0" y1="38" x2="1440" y2="38" stroke="#555540" stroke-width="1" opacity="0.4" />

  <!-- outer right lane line -->
  <line x1="0" y1="90" x2="1440" y2="90" stroke="#555540" stroke-width="1" opacity="0.4" />

  <!-- center dashes -->
  <line x1="0"    y1="64" x2="140"  y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <line x1="200"  y1="64" x2="340"  y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <line x1="400"  y1="64" x2="540"  y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <line x1="600"  y1="64" x2="740"  y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <line x1="800"  y1="64" x2="940"  y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <line x1="1000" y1="64" x2="1140" y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <line x1="1200" y1="64" x2="1340" y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <line x1="1360" y1="64" x2="1440" y2="64" stroke="#888866" stroke-width="2" opacity="0.4" stroke-linecap="round" />

  <!-- edge fade overlay -->
  <rect x="0" y="0" width="1440" height="120" fill="url(#fadeEdge)" />
</svg>