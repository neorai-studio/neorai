<svg width="240" height="160" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .fill { fill: #f7da08; fill-opacity: 0.15; }
      .line { fill: none; stroke: #f7da08; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow-gold); }
      .dot  { fill: none; stroke: #f7da08; stroke-width: 4; stroke-linecap: round; filter: url(#glow-gold); }
    </style>
  </defs>

  <!-- Fill -->
  <path class="fill" d="
    M 20 70
    C 18 40, 40 12, 120 10
    C 200 12, 222 40, 220 70
    C 220 90, 210 108, 195 120
    C 175 133, 150 138, 120 138
    C 90 138, 65 133, 45 120
    C 30 108, 20 90, 20 70
    Z
  "/>

  <!-- Outline -->
  <path class="line" d="
    M 20 70
    C 18 40, 40 12, 120 10
    C 200 12, 222 40, 220 70
    C 220 90, 210 108, 195 120
    C 175 133, 150 138, 120 138
    C 90 138, 65 133, 45 120
    C 30 108, 20 90, 20 70
    Z
  "/>

  <!-- Inner ridge line -->
  <path class="line" d="M 35 82 C 60 74, 90 70, 120 70 C 150 70, 180 74, 205 82"/>

  <!-- Center dot marks -->
  <line class="dot" x1="113" y1="108" x2="120" y2="108"/>
  <line class="dot" x1="127" y1="108" x2="134" y2="108"/>

</svg>
